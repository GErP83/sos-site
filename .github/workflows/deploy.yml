name: Build and Deploy with Toucan

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SWIFTINIT_ACCOUNT }}" ]; then
            echo "❌ Missing secret: SWIFTINIT_ACCOUNT"
            exit 1
          fi
          if [ -z "${{ secrets.SWIFTINIT_API_KEY }}" ]; then
            echo "❌ Missing secret: SWIFTINIT_API_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.SWIFTINIT_TARGET }}" ]; then
            echo "❌ Missing secret: SWIFTINIT_TARGET"
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: Prepare cache directory
        run: |
          mkdir -p ./cache ./cache/swiftinit ./cache/newsletter
          chmod -R 777 ./cache ./cache/swiftinit ./cache/newsletter

      - name: Create volume for output
        run: docker volume create toucan-docs

      - name: Build site using Toucan
        run: |
          docker run --rm \
            --mount type=bind,source=${{ github.workspace }},target=/site \
            --mount type=bind,source=${{ github.workspace }}/cache,target=/site/cache \
            --mount type=volume,source=toucan-docs,target=/site/docs \
            -w /site \
            -e SWIFTINIT_ACCOUNT=${{ secrets.SWIFTINIT_ACCOUNT }} \
            -e SWIFTINIT_API_KEY=${{ secrets.SWIFTINIT_API_KEY }} \
            -e SWIFTINIT_TARGET=${{ secrets.SWIFTINIT_TARGET }} \
            toucansites/toucan generate ./src ./docs

      - name: Copy built site from volume to local ./docs
        run: |
          mkdir -p ./docs
          CONTAINER_ID=$(docker create --mount type=volume,source=toucan-docs,target=/data busybox)
          docker cp $CONTAINER_ID:/data/. ./docs
          docker rm $CONTAINER_ID

      - name: Upload static site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs


  deploy-page:
    needs: build-page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4